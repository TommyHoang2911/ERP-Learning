<!DOCTYPE html>
<html lang="vi" data-theme="dark" data-font="normal">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Korea — Learning Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="logo">ERP<span>/</span>KR<span>_</span>LEARN</div>
  <p class="header-sub">Learning roadmap — Korean ERP Development</p>
  <div class="header-right">
    <div class="phase-indicator">phase <span id="active-phase-label">—</span></div>
    <div class="nav-controls">
      <button class="ctrl-btn" id="font-dec" title="Giảm cỡ chữ">A−</button>
      <button class="ctrl-btn" id="font-inc" title="Tăng cỡ chữ">A+</button>
      <button class="ctrl-btn theme-btn" id="theme-toggle" title="Chuyển giao diện">
        <span id="theme-icon">☀</span>
      </button>
    </div>
  </div>
</header>

<div class="app">
  <div class="roadmap-col">
    <div class="section-label">// roadmap — click để xem chi tiết</div>
    <div class="timeline" id="timeline"></div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-inner" id="detail-inner"></div>
  </div>
</div>

<footer>
  <div class="status-dot"></div>
  <span>ERP Korea Learning — Fresher Developer Track</span>
  <span class="footer-name" style="margin-left:auto; color: var(--text3)">Tommy Hoang · Da Nang, VN</span>
</footer>

<div id="prompt-modal" class="pm-overlay">
  <div class="pm-card">
    <div class="pm-header">
      <div class="pm-header-text">
        <span id="pm-tag" class="phase-tag"></span>
        <h2 id="pm-title"></h2>
        <p id="pm-sub"></p>
      </div>
      <button class="detail-close" onclick="closePromptModal()">✕ Đóng</button>
    </div>
    <div class="pm-body" id="pm-body"></div>
    <div class="pm-footer">
      <span class="pm-footer-hint">Đọc xong → dùng prompt này hỏi Claude để đào sâu hơn</span>
      <button class="pm-copy-btn" id="pm-copy-btn" onclick="copyCurrentPrompt()">↗ Copy prompt</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
