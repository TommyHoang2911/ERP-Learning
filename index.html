<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Korea — Learning Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0B0E13;
  --bg2: #111520;
  --bg3: #181d2a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #E8EAF0;
  --text2: #8B93A8;
  --text3: #545C70;
  --accent: #4AFFA0;
  --accent2: #00C9FF;
  --accent3: #FF6B6B;
  --amber: #FFB347;
  --purple: #A78BFA;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --panel-w: 520px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── Grid noise texture ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ─── Header ─── */
header {
  position: relative;
  z-index: 10;
  padding: 2.5rem 3rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.logo {
  font-family: var(--mono);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -0.02em;
}

.logo span { color: var(--text3); }

header p {
  font-size: 0.82rem;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.phase-indicator {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--text3);
}

.phase-indicator span {
  color: var(--accent);
  font-weight: 600;
}

/* ─── Main layout ─── */
.app {
  display: flex;
  min-height: calc(100vh - 85px);
  position: relative;
  z-index: 1;
}

/* ─── Left: Roadmap ─── */
.roadmap-col {
  flex: 1;
  padding: 2.5rem 2rem 2.5rem 3rem;
  overflow-y: auto;
  max-height: calc(100vh - 85px);
  transition: flex 0.4s cubic-bezier(0.4,0,0.2,1);
}

.section-label {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 1.75rem;
}

/* ─── Phase nodes ─── */
.timeline {
  position: relative;
  padding-left: 1.5rem;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 0;
  top: 8px;
  bottom: 8px;
  width: 1px;
  background: linear-gradient(to bottom, transparent, var(--border2) 10%, var(--border2) 90%, transparent);
}

.phase {
  position: relative;
  margin-bottom: 0.75rem;
  cursor: pointer;
}

.phase::before {
  content: '';
  position: absolute;
  left: -1.5rem;
  top: 20px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border2);
  border: 1px solid var(--border2);
  transition: all 0.2s;
  transform: translateX(-3px);
}

.phase.active::before,
.phase:hover::before {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(74,255,160,0.4);
}

.phase-card {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  background: var(--bg2);
  transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  overflow: hidden;
}

.phase-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  border-radius: 8px 0 0 8px;
  background: var(--border2);
  transition: background 0.2s;
}

.phase:hover .phase-card,
.phase.active .phase-card {
  border-color: var(--border2);
  background: var(--bg3);
}

.phase.active .phase-card::before { background: var(--accent); }
.phase:hover:not(.active) .phase-card::before { background: var(--text3); }

.phase-meta {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.5rem;
}

.phase-tag {
  font-family: var(--mono);
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 3px;
  font-weight: 500;
  letter-spacing: 0.04em;
}

.tag-green  { background: rgba(74,255,160,0.1); color: var(--accent); border: 1px solid rgba(74,255,160,0.2); }
.tag-blue   { background: rgba(0,201,255,0.1);  color: var(--accent2); border: 1px solid rgba(0,201,255,0.2); }
.tag-amber  { background: rgba(255,179,71,0.1); color: var(--amber);  border: 1px solid rgba(255,179,71,0.2); }
.tag-red    { background: rgba(255,107,107,0.1);color: var(--accent3); border: 1px solid rgba(255,107,107,0.2); }
.tag-purple { background: rgba(167,139,250,0.1);color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }

.phase-duration {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text3);
  margin-left: auto;
}

.phase-title {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 0.3rem;
}

.phase-desc {
  font-size: 0.78rem;
  color: var(--text2);
  line-height: 1.5;
}

.topic-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-top: 0.75rem;
}

.topic-pill {
  font-family: var(--mono);
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text3);
  background: transparent;
  transition: all 0.15s;
}

.phase:hover .topic-pill,
.phase.active .topic-pill {
  border-color: var(--border2);
  color: var(--text2);
}

/* ─── Connector arrows between phases ─── */
.connector {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.3rem 0;
  margin-left: -1.5rem;
}

.connector-line {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin-left: 3px;
}

/* ─── Right: Detail panel ─── */
.detail-panel {
  width: 0;
  overflow: hidden;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  border-left: 1px solid transparent;
  position: sticky;
  top: 0;
  height: calc(100vh - 85px);
  display: flex;
  flex-direction: column;
}

.detail-panel.open {
  width: var(--panel-w);
  border-left-color: var(--border);
}

.detail-inner {
  opacity: 0;
  transform: translateX(20px);
  transition: opacity 0.3s 0.15s, transform 0.3s 0.15s;
  height: 100%;
  overflow-y: auto;
  padding: 2rem 2rem 2rem 2rem;
  flex: 1;
}

.detail-panel.open .detail-inner {
  opacity: 1;
  transform: translateX(0);
}

.detail-header {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  margin-bottom: 1.75rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--border);
}

.detail-close {
  margin-left: auto;
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text3);
  cursor: pointer;
  padding: 4px 10px;
  font-family: var(--mono);
  font-size: 0.75rem;
  transition: all 0.15s;
  flex-shrink: 0;
}

.detail-close:hover { border-color: var(--border2); color: var(--text); }

.detail-phase-title {
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 0.25rem;
}

.detail-phase-sub {
  font-size: 0.78rem;
  color: var(--text2);
}

/* ─── Week cards in detail ─── */
.week-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}

.week-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem;
  transition: border-color 0.15s;
}

.week-card:hover { border-color: var(--border2); }

.week-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.4rem;
}

.week-name {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 0.6rem;
}

.skill-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.skill-list li {
  font-size: 0.75rem;
  color: var(--text2);
  line-height: 1.5;
  display: flex;
  gap: 0.5rem;
}

.skill-list li::before {
  content: '—';
  color: var(--text3);
  flex-shrink: 0;
}

/* ─── Claude prompt box ─── */
.prompt-box {
  background: rgba(74,255,160,0.04);
  border: 1px solid rgba(74,255,160,0.15);
  border-radius: 8px;
  padding: 1rem;
  margin-bottom: 1.5rem;
}

.prompt-box-title {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.06em;
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.prompt-box-title::before { content: '◆'; font-size: 0.5rem; }

.prompt-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.prompt-list li {
  font-size: 0.75rem;
  color: rgba(74,255,160,0.6);
  padding: 0.5rem 0;
  border-bottom: 1px solid rgba(74,255,160,0.08);
  cursor: pointer;
  display: flex;
  gap: 0.5rem;
  line-height: 1.5;
  transition: color 0.15s;
}

.prompt-list li:last-child { border-bottom: none; }
.prompt-list li:hover { color: var(--accent); }
.prompt-list li::before { content: '↗'; flex-shrink: 0; color: rgba(74,255,160,0.3); }

/* ─── Milestone bar ─── */
.milestone-section {
  margin-bottom: 1.5rem;
}

.milestone-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.6rem;
}

.milestone-list {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.milestone-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.78rem;
  color: var(--text2);
}

.milestone-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ─── Footer ─── */
footer {
  position: relative;
  z-index: 1;
  padding: 1rem 3rem;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text3);
  display: flex;
  gap: 1rem;
  align-items: center;
}

.status-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ─── Responsive ─── */
@media (max-width: 900px) {
  :root { --panel-w: 100vw; }
  .app { flex-direction: column; }
  .roadmap-col { max-height: none; padding: 1.5rem 1rem; }
  .detail-panel.open { width: 100%; height: auto; position: fixed; inset: 0; z-index: 100; background: var(--bg); overflow-y: auto; }
  .detail-panel.open .detail-inner { padding: 1.5rem 1rem; }
  header { padding: 1.5rem 1rem 1rem; }
}

/* ─── Animations ─── */
.phase { animation: slideUp 0.4s cubic-bezier(0.4,0,0.2,1) both; }
.phase:nth-child(1) { animation-delay: 0.05s; }
.phase:nth-child(2) { animation-delay: 0.1s; }
.phase:nth-child(3) { animation-delay: 0.15s; }
.phase:nth-child(4) { animation-delay: 0.2s; }
.phase:nth-child(5) { animation-delay: 0.25s; }
.phase:nth-child(6) { animation-delay: 0.3s; }
.phase:nth-child(7) { animation-delay: 0.35s; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── Prompt Detail Modal ─── */
.pm-overlay {
  position: fixed; inset: 0;
  background: rgba(7,9,14,0.88);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.pm-overlay.open { opacity: 1; pointer-events: all; }

.pm-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  width: 100%; max-width: 820px; max-height: 88vh;
  display: flex; flex-direction: column;
  transform: translateY(16px) scale(0.98);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 32px 80px rgba(0,0,0,0.55);
}
.pm-overlay.open .pm-card { transform: translateY(0) scale(1); }

.pm-header {
  padding: 1.5rem 1.5rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 1rem; align-items: flex-start;
  flex-shrink: 0;
}
.pm-header-text { flex: 1; }
.pm-header-text h2 { font-size: 1.05rem; font-weight: 500; color: var(--text); margin: 0.3rem 0 0.2rem; }
.pm-header-text p  { font-size: 0.76rem; color: var(--text2); }

.pm-body { padding: 1.5rem; overflow-y: auto; flex: 1; }

.pm-footer {
  padding: 0.875rem 1.5rem;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  gap: 1rem; flex-shrink: 0;
}
.pm-footer-hint { font-family: var(--mono); font-size: 0.65rem; color: var(--text3); }

.pm-copy-btn {
  background: rgba(74,255,160,0.08);
  border: 1px solid rgba(74,255,160,0.2);
  border-radius: 6px; color: var(--accent);
  font-family: var(--mono); font-size: 0.75rem;
  padding: 0.45rem 1.1rem; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.pm-copy-btn:hover { background: rgba(74,255,160,0.15); border-color: rgba(74,255,160,0.4); }

/* Learn content blocks */
.learn-section { margin-bottom: 1.75rem; }
.learn-section:last-child { margin-bottom: 0; }
.learn-section h3 {
  font-family: var(--mono); font-size: 0.67rem; font-weight: 600;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 0.875rem; padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 0.45rem;
}
.learn-section h3::before { content: '//'; color: var(--border2); }

.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
@media (max-width: 600px) { .compare-grid { grid-template-columns: 1fr; } }

.compare-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 1rem;
}
.compare-card.c-green  { border-top: 2px solid var(--accent); }
.compare-card.c-blue   { border-top: 2px solid var(--accent2); }
.compare-card.c-amber  { border-top: 2px solid var(--amber); }
.compare-card.c-red    { border-top: 2px solid var(--accent3); }
.compare-card.c-purple { border-top: 2px solid var(--purple); }

.cc-label { font-family: var(--mono); font-size: 0.62rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.25rem; }
.cc-title { font-size: 0.88rem; font-weight: 500; color: var(--text); margin-bottom: 0.5rem; }
.compare-card p { font-size: 0.76rem; color: var(--text2); line-height: 1.65; margin-bottom: 0.5rem; }

.diagram {
  background: #080b10; border: 1px solid var(--border);
  border-radius: 6px; padding: 1rem 1.25rem;
  font-family: var(--mono); font-size: 0.69rem; color: #6A7490;
  overflow-x: auto; line-height: 1.75; white-space: pre;
}

.code-block {
  background: #080b10; border: 1px solid var(--border);
  border-left: 3px solid rgba(0,201,255,0.35);
  border-radius: 6px; padding: 1rem 1.25rem;
  font-family: var(--mono); font-size: 0.7rem; color: #7BBFD8;
  overflow-x: auto; line-height: 1.8; white-space: pre;
}

.callout {
  border-radius: 6px; padding: 0.75rem 1rem;
  font-size: 0.77rem; line-height: 1.65; margin-bottom: 0.75rem;
}
.callout:last-child { margin-bottom: 0; }
.ca-green  { background: rgba(74,255,160,0.05);  border: 1px solid rgba(74,255,160,0.18);  color: rgba(74,255,160,0.85); }
.ca-blue   { background: rgba(0,201,255,0.05);   border: 1px solid rgba(0,201,255,0.18);   color: rgba(0,201,255,0.85); }
.ca-amber  { background: rgba(255,179,71,0.05);  border: 1px solid rgba(255,179,71,0.18);  color: rgba(255,179,71,0.85); }
.ca-red    { background: rgba(255,107,107,0.05); border: 1px solid rgba(255,107,107,0.18); color: rgba(255,107,107,0.85); }
.ca-purple { background: rgba(167,139,250,0.05); border: 1px solid rgba(167,139,250,0.18); color: rgba(167,139,250,0.85); }

.learn-list { list-style: none; margin: 0.5rem 0 0; display: flex; flex-direction: column; gap: 0.3rem; }
.learn-list li { font-size: 0.75rem; color: var(--text2); display: flex; gap: 0.5rem; line-height: 1.5; }
.learn-list li::before { content: '→'; color: var(--text3); flex-shrink: 0; }

.data-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
.data-table th { text-align: left; font-family: var(--mono); font-size: 0.62rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; padding: 0.4rem 0.75rem; border-bottom: 1px solid var(--border2); background: #080b10; }
.data-table td { padding: 0.5rem 0.75rem; color: var(--text2); border-bottom: 1px solid var(--border); line-height: 1.5; }
.data-table tr:last-child td { border-bottom: none; }

.hl { color: var(--accent); font-weight: 500; }
.hl-b { color: var(--accent2); font-weight: 500; }
.hl-a { color: var(--amber); font-weight: 500; }

@media (max-width: 900px) {
  .pm-overlay { padding: 0; align-items: flex-end; }
  .pm-card { max-height: 92vh; border-radius: 12px 12px 0 0; }
}
</style>
</head>
<body>

<header>
  <div class="logo">ERP<span>/</span>KR<span>_</span>LEARN</div>
  <p>Learning roadmap — Korean ERP Development</p>
  <div class="header-right">
    <div class="phase-indicator">phase <span id="active-phase-label">—</span></div>
  </div>
</header>

<div class="app">
  <!-- Left column: Roadmap -->
  <div class="roadmap-col">
    <div class="section-label">// roadmap — click để xem chi tiết</div>
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- Right panel: Detail -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-inner" id="detail-inner">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<footer>
  <div class="status-dot"></div>
  <span>ERP Korea Learning — Fresher Developer Track</span>
  <span style="margin-left:auto; color: var(--text3)">Tommy Hoang · Da Nang, VN</span>
</footer>

<!-- Prompt Detail Modal -->
<div id="prompt-modal" class="pm-overlay">
  <div class="pm-card">
    <div class="pm-header">
      <div class="pm-header-text">
        <span id="pm-tag" class="phase-tag"></span>
        <h2 id="pm-title"></h2>
        <p id="pm-sub"></p>
      </div>
      <button class="detail-close" onclick="closePromptModal()">✕ Đóng</button>
    </div>

<div class="learn-section"><h3>Công thức tính trong Payroll</h3>
<pre class="diagram">월보수 (Monthly Insurable Salary)

  장기요양      = FLOOR(건강보험료 × 12.95% / 10) × 10
  고용보험      = FLOOR(월보수 × 0.9%   / 10) × 10

  지방소득세    = FLOOR(소득세 × 10%)

NET PAY = Gross - 국민연금 - 건강보험 - 장기요양
               - 고용보험 - 소득세 - 지방소득세 - 기타공제

EMPLOYER COST (không deduct từ NV, dùng cho 비용 kế toán):

  건강보험(co)  = same as employee

        - employee.nonInsurableItems.sum()

  pensionEmp  = floor10(gross * rates.pension)
  healthEmp   = floor10(gross * rates.health)
  ltcEmp      = floor10(healthEmp * rates.ltc)
  unemployEmp = floor10(gross * rates.unemployEmp)
  incomeTax   = TaxTable.lookup(gross, year, employee.dependents)
  localTax    = floor(incomeTax * 0.10)

  netPay = gross - pensionEmp - healthEmp - ltcEmp

// 10원 단위 절사 (round down to nearest 10)

'p1_3': {
  title: '사업자등록번호 Validation',
  subtitle: 'Thuật toán check-digit mã số doanh nghiệp Hàn Quốc — giải thích và code',
  tag: 'Algorithm', tagClass: 'tag-green',
  body: `
<div class="learn-section"><h3>Cấu trúc mã số</h3>
<pre class="diagram">  사업자등록번호 = XXX - XX - XXXXX
                  │      │    │
                  │      │    └── 5 digits: Serial (순번) + Check digit
                  │      └─────── 2 digits: Business type code (업종코드)
                  └────────────── 3 digits: Regional tax office (지역코드)
                                  (서울 101-119, 부산 401-412, ...)

  Displayed:  123-45-67890  (hyphens for readability)
  Stored DB:  1234567890    (10 digits, no hyphens)
  Check digit = last digit (10th)</pre></div>

<div class="learn-section"><h3>Thuật toán Check Digit</h3>
<div class="callout ca-green">NTS dùng <strong>weighted checksum</strong> với multipliers cố định <code>[1,3,7,1,3,7,1,3,5]</code>. Đây là spec public, dùng để pre-validate trước khi submit lên Hometax.</div>
<pre class="diagram">Multipliers:  [ 1, 3, 7, 1, 3, 7, 1, 3, 5 ]   (positions 1-9)
Digits:        d1 d2 d3 d4 d5 d6 d7 d8 d9 d10
                                               └── check digit

Step 1: Weighted sum
        S = d1×1 + d2×3 + d3×7 + d4×1 + d5×3
          + d6×7 + d7×1 + d8×3 + d9×5

Step 2: Add floor((d9 × 5) / 10)   ← special treatment for position 9
        S2 = S + floor((d9 × 5) / 10)

Step 3: Expected check digit
        checkDigit = (10 - (S2 % 10)) % 10

Step 4: Valid if checkDigit === d10

Example: "101-86-09426"  →  d = [1,0,1,8,6,0,9,4,2,6]
  S = 1+0+7+8+18+0+9+12+10 = 65
  floor((2×5)/10) = floor(10/10) = 1
  S2 = 65 + 1 = 66
  checkDigit = (10 - 66%10) % 10 = (10-6)%10 = 4  ← but d10=6?

  (Try with real Samsung biz no for actual valid example)</pre></div>

<div class="learn-section"><h3>JavaScript Implementation</h3>
<pre class="code-block">/**
 * Validate 사업자등록번호 (Korean Business Reg. Number)
 * @param {string} bizNo  e.g. "123-45-67890" or "1234567890"
 * @returns {boolean}
 */
function validateBizNo(bizNo) {
  const cleaned = bizNo.replace(/[^0-9]/g, '');
  if (cleaned.length !== 10) return false;

  const d = cleaned.split('').map(Number);
  const multipliers = [1, 3, 7, 1, 3, 7, 1, 3, 5];

  let sum = 0;
  for (let i = 0; i < 9; i++) {
    sum += d[i] * multipliers[i];
  }

  // Special rule: add floor of (d[8] * 5 / 10)
  sum += Math.floor((d[8] * 5) / 10);

  const checkDigit = (10 - (sum % 10)) % 10;
  return checkDigit === d[9];
}

// Format helper: "1234567890" → "123-45-67890"
function formatBizNo(raw) {
  const n = raw.replace(/[^0-9]/g, '');
  if (n.length !== 10) return raw;
  return n.slice(0,3) + '-' + n.slice(3,5) + '-' + n.slice(5);
}</pre></div>

<div class="learn-section"><h3>ERP Integration Points</h3>
<ul class="learn-list">
  <li><strong>Vendor/Customer master creation:</strong> Validate trước khi save</li>
  <li><strong>세금계산서 issuance:</strong> Validate buyer bizNo trước khi call Hometax API</li>
  <li><strong>Data import/migration:</strong> Batch validate toàn bộ bizNos khi migrate từ legacy</li>
  <li><strong>API endpoint:</strong> Validate ở cả frontend (UX) và backend (security)</li>
</ul>
<div class="callout ca-amber" style="margin-top:0.75rem"><strong>⚠ Validation ≠ Verification</strong><br>Check digit chỉ verify format hợp lệ về toán học. Để verify doanh nghiệp đang hoạt động thực sự → cần call NTS API <strong>사업자 상태조회</strong> (business status lookup) — đây là bước riêng biệt và cần API key.</div></div>`
},

<div class="learn-section"><h3>ERP Calculation Logic</h3>
<pre class="code-block">function calculateYeontaxJeongsan(employeeId, year):

  // 6. Tax brackets (세율 구간) — 6%~45% progressive
  grossTax = applyProgressiveBrackets(taxableIncome, year)

  // 7. Tax credits (세액공제)
  taxCredit = earnedIncomeTaxCredit(totalIncome)
            + childTaxCredit + otherCredits

  finalTax = max(0, grossTax - taxCredit)

  // 8. Compare with already-withheld
  alreadyWithheld = PayrollRecord.sumIncomeTaxForYear(employeeId, year)
  adjustment = finalTax - alreadyWithheld
  // > 0: 추가징수  |  < 0: 환급</pre></div>

  subtitle: 'Tính ngày phép năm theo Bộ luật Lao động Hàn Quốc — pseudocode cho HR module',
  tag: 'Labour Law', tagClass: 'tag-blue',
  body: `
<div class="learn-section"><h3>근로기준법 — Quy tắc cơ bản</h3>
<div class="callout ca-blue"><strong>근로기준법 (Labour Standards Act)</strong> Article 60 quy định quyền nghỉ phép. Hai regime tính 연차 khác nhau: <strong>Year 1</strong> (tháng đầu tiên) và <strong>Year 2+</strong> (từ năm thứ hai). Developer phải implement cả hai.</div>
<div class="compare-grid">
  <div class="compare-card c-blue">
    <div class="cc-label">Năm đầu tiên (Year 1)</div>
    <div class="cc-title">Theo tháng làm việc</div>
    <p>Nhân viên mới được <strong>1 ngày phép cho mỗi tháng</strong> làm việc liên tục (đủ 1 tháng). Tối đa 11 ngày trong năm đầu.</p>
    <ul class="learn-list">
      <li>Áp dụng từ tháng 1 đến tháng 11</li>
      <li>Phát sinh đầu tháng tiếp theo</li>

    <div class="cc-label">Từ năm thứ 2 trở đi</div>
    <div class="cc-title">Theo ngày làm việc thực tế</div>
    <p>Mỗi năm được <strong>15 ngày</strong> nếu đi làm đủ 80%+ ngày. Thêm 1 ngày cho mỗi 2 năm làm thêm (max 25 ngày).</p>
    <ul class="learn-list">
      <li>Điều kiện: 80%+ attendance năm trước</li>
      <li>Base: 15 ngày/năm</li>
      <li>+1 ngày mỗi 2 năm sau năm thứ 3</li>
      <li>Tối đa 25 ngày/năm</li>
    </ul>
  </div>
</div></div>

<div class="learn-section"><h3>Bảng tính theo số năm làm việc</h3>
<table class="data-table">
<thead><tr><th>Years of Service</th><th>Annual Leave Days</th><th>Ghi chú</th></tr></thead>
<tbody>
<tr><td>Tháng 1–11 (Year 1)</td><td>1 day / month (max 11)</td><td>월차 — monthly accrual</td></tr>
<tr><td>1 năm đủ</td><td>15 ngày</td><td>Năm đầu đủ, thay thế các tháng trước</td></tr>
<tr><td>2 năm</td><td>15 ngày</td><td></td></tr>
<tr><td>3 năm</td><td>16 ngày</td><td>+1 bắt đầu từ năm 3</td></tr>
<tr><td>5 năm</td><td>17 ngày</td><td></td></tr>
<tr><td>10 năm</td><td>19 ngày (20 theo quy định mới)</td><td></td></tr>
<tr><td>21+ năm</td><td>25 ngày (maximum)</td><td>Cap = 25 ngày</td></tr>
</tbody></table></div>

<div class="learn-section"><h3>Pseudocode — Leave Calculation Engine</h3>
<pre class="code-block">function calculateAnnualLeave(employee, referenceDate):
  hireDate = employee.hireDate
  yearsOfService = dateDiffYears(hireDate, referenceDate)
  monthsOfService = dateDiffMonths(hireDate, referenceDate)

  // YEAR 1: monthly accrual
  if monthsOfService < 12:
    completedMonths = floor(monthsOfService)
    return min(completedMonths, 11)  // 1 day per month, max 11

  // YEAR 2+: annual entitlement
  if yearsOfService >= 1:
    attendanceRate = calculateAttendanceRate(
      employee.id,
      yearStart(hireDate, yearsOfService - 1),
      yearEnd(hireDate, yearsOfService - 1)
    )

    // Must have 80%+ attendance in prior year
    if attendanceRate < 0.80:
      baseDays = floor(15 * attendanceRate)  // pro-rated
    else:
      baseDays = 15

    // +1 day every 2 years starting from year 3
    bonus = floor((yearsOfService - 1) / 2)
    totalDays = min(baseDays + bonus, 25)  // cap at 25

    return totalDays

// Calculate attendance rate
function calculateAttendanceRate(empId, startDate, endDate):
  totalWorkDays  = countWorkDays(startDate, endDate)  // excl. holidays
  actualWorkDays = Attendance.countWorked(empId, startDate, endDate)
  // Note: approved leave counts as worked for attendance calc
  return actualWorkDays / totalWorkDays</pre></div>

<div class="learn-section"><h3>Edge Cases quan trọng</h3>
<div class="callout ca-amber"><strong>⚠ Leave during attendance calculation</strong><br>Các loại nghỉ sau được tính là <em>đi làm</em> khi tính 80%: nghỉ phép, nghỉ thai sản (출산휴가), nghỉ nuôi con (육아휴직), nghỉ tai nạn lao động. Implement từng loại riêng biệt.</div>
<div class="callout ca-red"><strong>⚠ 연차 소멸 (Expiry)</strong><br>연차 chưa dùng sẽ expire sau 1 năm (hoặc 2 năm nếu công ty có chương trình carry-over). Khi expire, công ty phải trả <strong>연차수당</strong> (leave pay) bằng tiền mặt. ERP cần auto-calculate và trigger payment.</div>
<div class="callout ca-blue"><strong>ℹ Pro-rated khi nghỉ giữa năm</strong><br>Nếu nhân viên rời công ty giữa năm, tính phép theo tỷ lệ tháng. Phép chưa dùng → trả 연차수당.</div></div>`
},

<tbody>
<tr><td><span class="hl">Standard rate</span></td><td>10%</td><td>Hầu hết hàng hóa, dịch vụ B2B/B2C</td></tr>
<tr><td><span class="hl-b">Zero-rated</span></td><td>0%</td><td>Xuất khẩu (수출), dịch vụ ngoại tệ, vận tải quốc tế</td></tr>
<tr><td><span class="hl-a">Exempt (면세)</span></td><td>N/A</td><td>Giáo dục, y tế, tài chính cơ bản, thực phẩm thiết yếu</td></tr>
</tbody></table>
<div class="callout ca-amber" style="margin-top:0.75rem"><strong>Zero-rated ≠ Exempt!</strong> Zero-rated vẫn phải phát hành 세금계산서 và có thể claim input VAT refund. Exempt thì không issue 세금계산서 và không claim được input VAT.</div></div>

<div class="learn-section"><h3>Cơ chế Input / Output VAT</h3>
<pre class="diagram">OUTPUT VAT (매출세액) — từ bán hàng:
  AR Invoice ₩1,100,000 = Supply ₩1,000,000 + VAT ₩100,000
  → ERP: CR 부가세예수금 (VAT Payable) ₩100,000

INPUT VAT (매입세액) — từ mua hàng:
  AP Invoice ₩1,100,000 = Supply ₩1,000,000 + VAT ₩100,000
  → ERP: DR 부가세대급금 (VAT Receivable) ₩100,000

QUARTERLY SETTLEMENT:
  VAT to Pay = Output VAT - Input VAT - Deductions

  Example (Q1):
    Output VAT collected:  ₩50,000,000
    Input VAT paid:        ₩30,000,000
    Special deductions:    ₩ 2,000,000
    ─────────────────────────────────
    Net VAT payable:       ₩18,000,000  → nộp cho NTS</pre></div>

<div class="learn-section"><h3>Reporting Cycle (신고납부 주기)</h3>
<pre class="diagram">  1월 25일  → 1분기 예정신고 (Jul–Dec prior year)
  4월 25일  → 1기 확정신고 (Jan–Jun current year)
  7월 25일  → 2분기 예정신고 (Jan–Jun)
  10월 25일 → 2기 확정신고 (Jul–Dec)

  주요 신고서:
  - 부가가치세 신고서 (VAT Return)
  - 매출처별 세금계산서합계표 (AR summary by customer)
  - 매입처별 세금계산서합계표 (AP summary by vendor)
  - 신용카드매출전표등 수령명세서 (card receipt summary)</pre></div>

<div class="learn-section"><h3>ERP Implementation Points</h3>
<pre class="code-block">// VAT Ledger structure
CREATE TABLE vat_ledger (
  id           BIGINT PRIMARY KEY,
  period       CHAR(6),            -- 'YYYYMM'
  vat_type     ENUM('OUTPUT','INPUT','EXEMPT','ZERO'),
  invoice_id   BIGINT,
  invoice_type ENUM('AR','AP'),
  supply_amt   DECIMAL(18,2),
  vat_amt      DECIMAL(18,2),
  biz_no       VARCHAR(10),        -- counterparty biz number
  tax_inv_no   VARCHAR(24)
);

// Quarterly VAT calculation
function calculateQuarterlyVAT(year, quarter):
  periods = getMonthsInQuarter(year, quarter)  // e.g. ['202401','202402','202403']

  outputVAT = VatLedger.sum('OUTPUT', periods)
  inputVAT  = VatLedger.sum('INPUT', periods)

  // Apply special deductions (신용카드매출공제, etc.)
  deductions = calculateVATDeductions(year, quarter)

  netPayable = max(0, outputVAT - inputVAT - deductions)
  // If negative: refund (환급) claim to NTS
  return { outputVAT, inputVAT, deductions, netPayable }</code></pre></div>

<div class="learn-section"><h3>Lưu ý quan trọng cho Developer</h3>
<div class="callout ca-red"><strong>⚠ ₩ rounding trong VAT</strong><br>VAT amount phải làm tròn xuống 1원 (không làm tròn đến 10원 như 소득세). Sai sẽ không match với NTS records.</div>
<div class="callout ca-blue"><strong>ℹ VAT trên hàng mix rate</strong><br>Một invoice có thể chứa cả mặt hàng 10%, 0%, và exempt. ERP phải split và track từng dòng riêng biệt trong <code>invoice_line_items</code>.</div></div>`
},

  title: 'Hometax API Integration',
  subtitle: 'Flow submit 세금계산서 và nhận kết quả từ NTS — kỹ thuật tích hợp',
  tag: 'API / NTS', tagClass: 'tag-blue',
  body: `
<div class="learn-section"><h3>Kiến trúc hệ thống</h3>
<div class="callout ca-blue">Hometax (홈택스) là cổng thuế điện tử của NTS. ERP không gọi trực tiếp NTS mà thông qua <strong>공인인증 (Authorized Cert)</strong> hoặc provider trung gian (ASP — Application Service Provider) như Billit, eForce, iTax... Nhiều công ty Hàn dùng ASP để đơn giản hóa.</div>
<div class="compare-grid">
  <div class="compare-card c-green">
    <div class="cc-label">Direct Integration</div>
    <div class="cc-title">ERP → Hometax</div>
    <ul class="learn-list">
      <li>Dùng 공인인증서 (공동인증서)</li>
      <li>Complex certificate management</li>
      <li>Free API, nhưng setup phức tạp</li>
      <li>Phù hợp công ty lớn, IT team mạnh</li>
    </ul>
  </div>
  <div class="compare-card c-blue">
    <div class="cc-label">Via ASP (phổ biến hơn)</div>
    <div class="cc-title">ERP → ASP → Hometax</div>
    <ul class="learn-list">
      <li>ASP quản lý cert & Hometax auth</li>
      <li>REST API đơn giản hơn</li>
      <li>Có phí per-invoice (~₩10–30)</li>
      <li>Phù hợp SME và startup ERP</li>
    </ul>
  </div>
</div></div>

<div class="learn-section"><h3>API Flow — Issuance (발행)</h3>
<pre class="diagram">ERP Backend                 ASP/Hometax               NTS
     │                            │                     │
     │ 1. Prepare payload         │                     │
     │    {                       │                     │
     │      supplier: {bizNo,     │                     │
     │        name, address},     │                     │
     │      buyer: {bizNo, name}, │                     │
     │      items: [{name, qty,   │                     │
     │        unitPrice, amount}],│                     │
     │      supplyAmount: int,    │                     │
     │      vatAmount: int,       │                     │
     │      issueDate: YYYYMMDD   │                     │
     │    }                       │                     │
     │                            │                     │
     │ 2. POST /api/taxinvoice/issue                    │
     │    Authorization: Bearer {token}                 │
     │───────────────────────────▶│                     │
     │                            │ 3. Sign with cert   │
     │                            │────────────────────▶│
     │                            │ 4. NTS confirmation │
     │ 5. {                       │◀────────────────────│
     │      taxInvoiceNo: "...",  │                     │
     │      status: "ISSUED",     │                     │
     │      issuedAt: ISO8601     │                     │
     │    }                       │                     │
     │◀───────────────────────────│                     │
     │                            │                     │
     │ 6. Update DB:              │                     │
     │    ar_invoice.tax_invoice_no = taxInvoiceNo      │
     │    ar_invoice.status = 'NTS_CONFIRMED'           │</pre></div>

<div class="learn-section"><h3>Error Handling & Retry Pattern</h3>
<pre class="code-block">async function issueTaxInvoice(invoiceData, maxRetries = 3) {
  for (let attempt = 1; attempt <= maxRetries; attempt++) {
    try {
      const response = await hometaxClient.post('/issue', invoiceData)

      if (response.status === 'ISSUED') {
        await db.arInvoice.update({
          taxInvoiceNo: response.taxInvoiceNo,
          status: 'NTS_CONFIRMED',
          issuedAt: response.issuedAt
        })
        return { success: true, taxInvoiceNo: response.taxInvoiceNo }
      }

    } catch (err) {
      if (err.code === 'DUPLICATE_INVOICE') {
        // Already issued — fetch existing number
        return await fetchExistingTaxInvoice(invoiceData)
      }

      if (err.code === 'INVALID_BUYER_BIZNO') {
        // Don't retry — data issue, needs human fix
        await notifyHRTeam(err)
        throw err
      }

      if (attempt < maxRetries) {
        await sleep(1000 * attempt)  // exponential backoff
        continue
      }

      // All retries failed — queue for manual retry
      await FailedInvoiceQueue.push(invoiceData, err)
      throw new Error('Tax invoice issuance failed after retries')
    }
  }
}</pre></div>

<div class="learn-section"><h3>Key Error Codes</h3>
<table class="data-table">
<thead><tr><th>Code</th><th>Meaning</th><th>Action</th></tr></thead>
<tbody>
<tr><td><span class="hl">DUPLICATE_INVOICE</td><td>Already issued</td><td>Fetch existing, do not retry</td></tr>
<tr><td><span class="hl-a">INVALID_BUYER_BIZNO</td><td>Buyer biz reg. invalid</td><td>Notify sales team, fix data</td></tr>
<tr><td><span class="hl-b">CERT_EXPIRED</td><td>공인인증서 expired</td><td>Renew cert — ops alert</td></tr>
<tr><td><span class="hl-a">DEADLINE_EXCEEDED</td><td>Past 익월 10일</td><td>Issue as late filing, may incur penalty</td></tr>
<tr><td>TIMEOUT</td><td>NTS system busy</td><td>Retry with backoff</td></tr>
</tbody></table></div>`
},

  subtitle: 'Phương pháp chuyển đổi tài liệu đặc tả Hàn sang yêu cầu kỹ thuật rõ ràng',

  body: `
<div class="learn-section"><h3>Glossary — ERP Terms phổ biến trong spec Hàn</h3>
<table class="data-table">
<thead><tr><th>Korean</th><th>Nghĩa</th><th>ERP Context</th></tr></thead>
<tbody>
<tr><td>요구사항</td><td>Requirements</td><td>Functional requirements doc</td></tr>
<tr><td>화면설계서</td><td>Screen design doc</td><td>UI wireframe + field spec</td></tr>
<tr><td>테이블정의서</td><td>Table definition</td><td>DB schema document</td></tr>
<tr><td>업무흐름도</td><td>Business flow</td><td>Process flowchart</td></tr>
<tr><td>필수값</td><td>Required field</td><td>NOT NULL / mandatory input</td></tr>
<tr><td>조회조건</td><td>Search condition</td><td>Filter/WHERE clause params</td></tr>
<tr><td>승인 / 반려</td><td>Approve / Reject</td><td>Workflow approval steps</td></tr>
<tr><td>마감</td><td>Closing/cutoff</td><td>Period closing</td></tr>
<tr><td>배치</td><td>Batch job</td><td>Scheduled background process</td></tr>
<tr><td>자동채번</td><td>Auto-numbering</td><td>Auto-generate sequence number</td></tr>
<tr><td>이관</td><td>Transfer/migrate</td><td>Data migration or handover</td></tr>
<tr><td>재조회</td><td>Re-query/refresh</td><td>Reload data after save</td></tr>
</tbody></table></div>
<div class="learn-section"><h3>Quy trình đọc spec → Technical Breakdown</h3>
<pre class="diagram">Step 1: SCAN OVERALL STRUCTURE
  화면설계서 → field list, UI logic
  업무흐름도 → API endpoints needed
  테이블정의서 → DB changes needed

Step 2: EXTRACT BUSINESS RULES
  Look for keywords:
  "경우"       → conditional branch
  "단,"        → exception/special case
  "필수"        → required validation
  "자동"        → auto-generated
  "이상/이하"   → >= or <= conditions

Step 3: CLARIFY AMBIGUITIES
  Template: "[조건X]인 경우 [결과Y]는 어떻게 처리하나요?"
  ("When [condition X], how should [result Y] be handled?")

Step 4: BREAKDOWN INTO TASKS
  UI:          fields, validations, display conditions
  API:         endpoints, request/response schemas
  DB:          new tables, columns, indexes
  Logic:       calculation rules, workflow transitions
  Integration: Hometax, banking, external systems</pre></div>
<div class="learn-section"><h3>Ví dụ thực tế: Phân tích đoạn spec</h3>
<pre class="diagram">SPEC (Korean):
"발주번호는 자동 채번되며 [사업장코드 3자리]+[년도 4자리]+
[월 2자리]+[일련번호 5자리] 형식으로 생성된다.
단, 취소된 발주의 번호는 재사용하지 않는다."

BREAKDOWN:
1. [DB] purchase_order.order_no VARCHAR(14) UNIQUE NOT NULL
2. [Logic] Format: {bizplace(3)}{yyyy(4)}{mm(2)}{seq(5, zero-pad)}
3. [Logic] Sequence resets monthly per bizplace
4. [Logic] Cancelled POs: status='CANCELLED', order_no stays consumed
5. [DB] po_sequence(bizplace_code, year, month, last_seq) table
6. [Caution] Race condition on concurrent inserts → need DB lock or sequence</pre></div>
<div class="learn-section"><h3>Red Flags — Cụm từ cần hỏi lại ngay</h3>
<div class="callout ca-amber"><strong>⚠ Phrases cần clarify trước khi code</strong></div>
<ul class="learn-list">
  <li><strong>"기존과 동일하게"</strong> — "Same as before" → need to check legacy system</li>
  <li><strong>"적절히 처리"</strong> — "Handle appropriately" → too vague, ask for exact rule</li>
  <li><strong>"추후 협의"</strong> — "To be discussed" → will block you, clarify now</li>
  <li>Mọi logic liên quan đến tiền, thuế, lương → xác nhận bằng số ví dụ cụ thể</li>
</ul></div>`
},

'p3_1': {
  title: 'Audit Trail System cho ERP',
  subtitle: 'Schema design & middleware pattern — track mọi thay đổi dữ liệu quan trọng',
  tag: 'ERP Pattern', tagClass: 'tag-amber',
  body: `
<div class="learn-section"><h3>Tại sao ERP bắt buộc cần Audit Trail?</h3>
<div class="callout ca-amber">ERP xử lý dữ liệu tài chính, lương, thuế. Mọi thay đổi phải có dấu vết. Yêu cầu từ: <strong>K-IFRS</strong> (audit requirement), <strong>NTS</strong> (tax audit traceability), <strong>PIPA</strong> (data access logging), internal compliance. Thiếu audit trail = không pass external audit.</div>
<div class="compare-grid">
  <div class="compare-card c-amber">
    <div class="cc-label">Shadow / History Table</div>
    <div class="cc-title">Full row snapshot</div>
    <ul class="learn-list">
      <li>Copy toàn bộ row vào <code>_history</code> table</li>
      <li>Easy: query state at any point in time</li>
      <li>Dùng cho: GL entries, payroll records</li>
      <li>Storage tốn nhưng query đơn giản</li>
    </ul>
  </div>
  <div class="compare-card c-green">
    <div class="cc-label">Event Log (Diff)</div>
    <div class="cc-title">Field-level changes</div>
    <ul class="learn-list">
      <li>Log {field, old_value, new_value} per change</li>
      <li>Storage nhẹ, dễ show "who changed what"</li>
      <li>Dùng cho: vendor/customer master data</li>
      <li>Query phức tạp hơn để rebuild state</li>
    </ul>
  </div>
</div></div>
<div class="learn-section"><h3>Schema Design</h3>
<pre class="code-block">CREATE TABLE audit_log (
  id          BIGINT AUTO_INCREMENT PRIMARY KEY,
  table_name  VARCHAR(64)  NOT NULL,
  record_id   BIGINT       NOT NULL,
  action      ENUM('CREATE','UPDATE','DELETE','APPROVE',
                   'REJECT','POST','CANCEL','RESTORE'),
  changed_by  BIGINT       NOT NULL,
  changed_at  DATETIME(3)  NOT NULL DEFAULT CURRENT_TIMESTAMP(3),
  ip_address  VARCHAR(45),
  session_id  VARCHAR(128),
  old_values  JSON,         -- snapshot before change
  new_values  JSON,         -- snapshot after change
  reason      TEXT,

  INDEX (table_name, record_id),
  INDEX (changed_at),
  INDEX (changed_by)
);</pre></div>
<div class="learn-section"><h3>Middleware Pattern</h3>
<pre class="code-block">// Audit middleware (Express.js)
async function withAudit(tableName, action) {
  return async (req, res, next) => {
    req.auditCtx = { table: tableName, action }
    const origJson = res.json.bind(res)
    res.json = async (body) => {
      if (res.statusCode < 300 && req.auditCtx.before !== undefined) {
        await db('audit_log').insert({
          table_name: req.auditCtx.table,
          record_id:  req.auditCtx.recordId,
          action:     req.auditCtx.action,
          changed_by: req.user.id,
          ip_address: req.ip,
          old_values: JSON.stringify(req.auditCtx.before),
          new_values: JSON.stringify(req.auditCtx.after),
          reason:     req.body?.reason
        })
      }
      return origJson(body)
    }
    next()
  }
}

// Usage:
router.put('/vendors/:id',
  withAudit('vendors', 'UPDATE'),
  async (req, res) => {
    req.auditCtx.before   = await Vendor.findById(req.params.id)
    req.auditCtx.recordId = req.params.id
    const updated = await Vendor.update(req.params.id, req.body)
    req.auditCtx.after = updated
    res.json({ data: updated })
  }
)</pre></div>
<div class="learn-section"><h3>Immutability Rule</h3>
<div class="callout ca-red"><strong>⚠ Posted entries CANNOT be deleted — only reversed</strong><br>Khi journal entry/invoice đã "posted" (vào sổ cái), KHÔNG được DELETE. Phải tạo reversing entry. Enforce ở application layer: check status trước mọi DELETE operation, throw error nếu posted.</div></div>`
},

  body: `
<div class="learn-section"><h3>3 Mô hình kiến trúc</h3>
<pre class="diagram">Model A: SHARED DB, SHARED SCHEMA

<div class="learn-section"><h3>Shared vs Isolated Data</h3>

<tr><td>vendor master, customer master</td><td class="hl">Shared</td><td>Same vendor serves multiple entities</td></tr>

</tbody></table></div>
<div class="learn-section"><h3>Korea: 연결재무제표 (Consolidated Financials)</h3>

  title: 'RBAC Design cho ERP Hàn Quốc',
  subtitle: 'Roles, permissions, department scope — Korean corporate hierarchy',
  tag: 'Security', tagClass: 'tag-amber',
  body: `
<div class="learn-section"><h3>RBAC với Korean Corporate Hierarchy</h3>
<pre class="diagram">Standard RBAC: User → Role → Permission → Resource

ERP Korea adds: SCOPE dimension
  User → Role → Permission → Resource
           │                     │
           └── Scope ────────────┘
               (company_id, dept_id, amount_limit)

Korean Hierarchy:
  회장 (Chairman) → 사장 (CEO) → 본부장 (Division Head)
  → 팀장 (Team Leader) → 과장/대리/사원 (Staff levels)

ERP Role mapping:
  SYSTEM_ADMIN     → full access, all companies
  CFO              → all financial modules, own group
  ACCOUNTING_MGR   → GL/AP/AR approve, own company
  ACCOUNTING_STAFF → GL/AP/AR create, own dept

  PAYROLL_STAFF    → payroll process, own dept

<div class="learn-section"><h3>DB Schema</h3>
<pre class="code-block">CREATE TABLE permissions (
  id       INT PRIMARY KEY,
  resource VARCHAR(50),   -- 'ap_invoice', 'payroll', 'gl_entry'

  UNIQUE (resource, action)
);

CREATE TABLE role_permissions (
  role_id       INT,
  permission_id INT,
  amount_limit  DECIMAL(18,2) NULL,  -- NULL = unlimited
  PRIMARY KEY (role_id, permission_id)
);

CREATE TABLE user_roles (
  user_id    BIGINT,
  role_id    INT,
  company_id BIGINT NULL,  -- NULL = all companies
  dept_id    BIGINT NULL,  -- NULL = all departments
  granted_by BIGINT,
  expires_at DATETIME NULL, -- for temporary access
  PRIMARY KEY (user_id, role_id, company_id, dept_id)
);</pre></div>
<div class="learn-section"><h3>Permission Check Middleware</h3>
<pre class="code-block">function requirePermission(resource, action) {
  return async (req, res, next) => {
    const { id: userId } = req.user
    const companyId = req.params.companyId || req.body.companyId
    const amount    = req.body?.amount

    const allowed = await db.queryOne(
      'SELECT rp.amount_limit FROM user_roles ur ' +
      'JOIN role_permissions rp ON ur.role_id = rp.role_id ' +
      'JOIN permissions p ON rp.permission_id = p.id ' +
      'WHERE ur.user_id = ? AND p.resource = ? AND p.action = ? ' +
      'AND (ur.company_id IS NULL OR ur.company_id = ?) ' +
      'AND (ur.expires_at IS NULL OR ur.expires_at > NOW()) LIMIT 1',
      [userId, resource, action, companyId]
    )

    if (!allowed) return res.status(403).json({ error: '권한이 없습니다.' })
    if (allowed.amount_limit && amount > allowed.amount_limit) {
      return res.status(403).json({ error: '결재 한도를 초과했습니다.' })
    }
    next()
  }
}</pre></div>
<div class="learn-section"><h3>결재선 (Approval Workflow) — Korean specifics</h3>
<div class="callout ca-amber"><strong>결재 (Gyal-jae) = Formal Approval Routing</strong><br>Văn hóa 결재 Hàn Quốc: mọi quyết định quan trọng phải đi qua 기안 (draft) → 검토 (review) → 승인 (approve). RBAC kiểm soát ai được approve, nhưng cần thêm workflow engine để route đúng người theo chức vụ và amount limit.</div>
<div class="callout ca-blue"><strong>직급별 전결권한 (Approval limits by rank)</strong><br>대리 ≤ ₩500K, 과장 ≤ ₩2M, 팀장 ≤ ₩10M, 본부장 ≤ ₩50M, 사장 unlimited. Store in <code>role_permissions.amount_limit</code>. Critical for AP invoice approval flow.</div></div>`
},

'p4_0': {
  title: 'PIPA vs GDPR — ERP Developer cần implement gì?',
  subtitle: '개인정보보호법 vs GDPR: điểm giống, khác, và checklist kỹ thuật',
  tag: 'Compliance', tagClass: 'tag-red',
  body: `
<div class="learn-section"><h3>So sánh PIPA vs GDPR</h3>
<table class="data-table">
<thead><tr><th>Criteria</th><th>PIPA (Korea)</th><th>GDPR (EU)</th></tr></thead>
<tbody>
<tr><td>Enforcer</td><td>PIPC (개인정보보호위원회)</td><td>National DPAs</td></tr>
<tr><td>Max penalty</td><td>3% of annual revenue</td><td>4% of global revenue</td></tr>
<tr><td>Consent</td><td>Explicit + purpose-limited</td><td>Lawful basis (consent is 1 of 6)</td></tr>
<tr><td>Breach notification</td><td>72h to PIPC, 5 days to subject</td><td>72h to DPA, ASAP to subject</td></tr>
<tr><td>Right to access</td><td>Within 10 business days</td><td>Within 30 days</td></tr>
<tr><td>Cross-border transfer</td><td>Consent or adequate country</td><td>Adequacy/SCCs/BCRs</td></tr>
</tbody></table></div>
<div class="learn-section"><h3>ERP Personal Data Categories</h3>
<pre class="diagram">SENSITIVE (민감정보) — explicit separate consent required:
  건강/의료정보 → medical expense reimbursements
  개인신용정보  → salary, loan records
  노조 성향     → union membership

STANDARD PERSONAL INFO — consent required:
  이름, 주민등록번호 → employee master
  연락처 (phone, email, address) → HR, CRM
  은행계좌번호      → payroll bank transfers
  여권번호          → expat employees

⚠ 주민등록번호 (Resident ID) rules:
  - Must be encrypted at rest (AES-256)
  - Only store after identity verification
  - Store masked version: 900101-*******
  - Never appear in logs</pre></div>
<div class="learn-section"><h3>Developer Checklist</h3>
<ul class="learn-list">
  <li><strong>암호화:</strong> 주민번호, 비밀번호, 계좌번호 → AES-256 at rest, TLS in transit</li>
  <li><strong>접근통제:</strong> Only authorized roles read sensitive fields. Log every access.</li>
  <li><strong>수집목적 제한:</strong> Only collect fields needed for stated purpose</li>
  <li><strong>보유기간 정의:</strong> 근로자 퇴직 후 3년, 세금관련 5년, etc. Auto-delete/anonymize</li>
  <li><strong>열람/삭제 요청:</strong> API endpoint to respond within 10 business days</li>
  <li><strong>개인정보 처리방침:</strong> Must be public. Record user acceptance version+date</li>
</ul></div>
<div class="learn-section"><h3>Masking Pattern</h3>
<pre class="code-block">function maskPII(data, userRole) {
  const result = { ...data }

  // 주민등록번호: show first 7 only
  if (result.residentId)
    result.residentId = result.residentId.slice(0, 7) + '******'

  // 계좌번호: last 4 only
  if (result.bankAccount)
    result.bankAccount = '***-***-' + result.bankAccount.slice(-4)

  // 전화번호: mask middle
  if (result.phone)
    result.phone = result.phone.replace(/(\d{3})-(\d{4})-(\d{4})/, '$1-****-$3')

  // HR/Auditor roles get unmasked + access logged
  if (['HR_MGR','AUDITOR'].includes(userRole)) {
    AuditLog.insert({ action: 'VIEW_PII', userId: currentUser.id, ... })
    return data
  }
  return result
}</pre></div>`
},

'p4_1': {
  title: 'Korean Open Banking API',
  subtitle: 'KFTC Open Banking ecosystem — flow tích hợp vào ERP',
  tag: 'Fintech', tagClass: 'tag-red',
  body: `
<div class="learn-section"><h3>Open Banking Hàn Quốc</h3>
<div class="callout ca-blue"><strong>금융결제원 (KFTC)</strong> vận hành Open Banking từ 2019. Cho phép ERP/fintech access account info và payment của tất cả ngân hàng Hàn qua 1 API, thay vì integrate từng ngân hàng riêng.</div>
<pre class="diagram">WITHOUT Open Banking:
  ERP ──▶ Kookmin Bank API   (N integrations)
  ERP ──▶ Shinhan Bank API
  ERP ──▶ Woori Bank API

WITH KFTC Open Banking:
  ERP ──▶ KFTC Open Banking API ──▶ All member banks
          (1 integration, all banks)</pre></div>
<div class="learn-section"><h3>3 Loại API chính</h3>
<table class="data-table">
<thead><tr><th>API Type</th><th>Chức năng</th><th>ERP Use Case</th></tr></thead>
<tbody>
<tr><td><span class="hl">Account Inquiry</span></td><td>Balance, transaction history</td><td>Bank reconciliation, cash position</td></tr>
<tr><td><span class="hl-b">Transfer</span></td><td>Send payment from linked account</td><td>AP payment, payroll disbursement</td></tr>
<tr><td><span class="hl-a">Account Registration</span></td><td>Link bank account via consent</td><td>Employee bank account verification</td></tr>
</tbody></table></div>
<div class="learn-section"><h3>AP Payment Flow via Open Banking</h3>
<pre class="diagram">ERP AP          KFTC Open Banking        Corporate Bank    Vendor Bank
   │                    │                      │                │
   │ 1. Batch payment   │                      │                │
   │    request         │                      │                │
   │───────────────────▶│                      │                │
   │                    │ 2. Auth (OAuth2)      │                │
   │                    │─────────────────────▶│                │
   │                    │ 3. Debit source acct  │                │
   │                    │─────────────────────▶│                │
   │                    │                       │ 4. Credit dest │
   │                    │                       │───────────────▶│
   │ 5. {status,        │                       │                │
   │     ref_no,        │                       │                │
   │     completed_at}  │                       │                │
   │◀───────────────────│                       │                │
   │ 6. Update AP PAID  │                       │                │</pre></div>
<div class="learn-section"><h3>Bank Reconciliation Auto-Match</h3>
<pre class="code-block">async function reconcile(companyId, accountId, date) {
  // Pull actual bank transactions
  const bankTxns = await openBankingClient.getTransactions({ accountId, date })

  // Get ERP pending transactions
  const erpTxns = await db('payment_transactions')
    .where({ company_id: companyId, txn_date: date, status: 'PENDING_CONFIRM' })

  for (const bankTxn of bankTxns) {
    const match = erpTxns.find(e =>
      e.amount === bankTxn.amount &&
      bankTxn.description.includes(e.reference_no)
    )
    if (match) {
      await db('payment_transactions').where('id', match.id)
        .update({ status: 'CONFIRMED', bank_txn_id: bankTxn.id })
    } else {
      await UnmatchedTxn.create({ bankTxn, companyId })  // manual review
    }
  }
}</pre></div>`
},

'p4_3': {
  title: 'MES Integration Pattern với ERP',
  subtitle: 'Manufacturing Execution System ↔ ERP: realtime vs batch — khi nào dùng gì',
  tag: 'Integration', tagClass: 'tag-red',
  body: `
<div class="learn-section"><h3>MES vs ERP — Ranh giới rõ ràng</h3>
<pre class="diagram">          MES (공장 시스템)         │    ERP (기간업무 시스템)
  ────────────────────────────────────┼────────────────────────────────
  Phạm vi: Shop floor, machines       │ Business processes, finance
  Thời gian: Realtime (seconds)       │ Batch/daily (hours)
  Data:    Machine signals, WIP       │ Orders, inventory cost, GL
  Users:   Factory operators          │ Accountants, planners, mgmt
  ────────────────────────────────────┼────────────────────────────────
  MES owns: Production orders         │ ERP owns: Sales orders
             Work-in-progress         │           Purchase orders
             Machine utilization      │           Inventory valuation
             Quality inspection       │           Cost accounting</pre></div>
<div class="learn-section"><h3>Integration Points</h3>
<table class="data-table">
<thead><tr><th>Data</th><th>Direction</th><th>Timing</th></tr></thead>
<tbody>
<tr><td>Production Order (작업지시)</td><td>ERP → MES</td><td>On creation</td></tr>
<tr><td>BOM (자재명세서)</td><td>ERP → MES</td><td>On change</td></tr>
<tr><td>Production Completion</td><td>MES → ERP</td><td>Batch (end of shift)</td></tr>
<tr><td>Material Consumption</td><td>MES → ERP</td><td>Batch (backflush)</td></tr>
<tr><td>Quality Rejects</td><td>MES → ERP</td><td>Realtime (critical)</td></tr>
<tr><td>Labor Hours</td><td>MES → ERP</td><td>Daily batch</td></tr>
</tbody></table></div>
<div class="learn-section"><h3>Realtime vs Batch</h3>
<div class="compare-grid">
  <div class="compare-card c-amber">
    <div class="cc-label">Realtime (Event-driven)</div>
    <div class="cc-title">Kafka / Message Queue</div>
    <ul class="learn-list">
      <li>MES publishes events → ERP consumes</li>
      <li>Inventory always current</li>
      <li>Complex error handling, ordering</li>
      <li>Dùng cho: critical quality rejects, stock-outs</li>
    </ul>
  </div>
  <div class="compare-card c-green">
    <div class="cc-label">Batch (phổ biến ở Hàn)</div>
    <div class="cc-title">File / Scheduled API</div>
    <ul class="learn-list">
      <li>End-of-shift CSV/XML file or API call</li>
      <li>Simpler, predictable load</li>
      <li>Delay: hours behind production</li>
      <li>Most Korean factories use this</li>
    </ul>
  </div>
</div></div>
<div class="learn-section"><h3>Batch Import Pattern</h3>
<pre class="code-block">async function importMESCompletion(batchFile) {
  const records = parseCSV(batchFile)
  const errors  = []

  for (const rec of records) {
    try {
      await db.transaction(async (trx) => {
        const po = await ProductionOrder.findById(rec.productionOrderId, trx)
        if (!po || po.status !== 'IN_PROGRESS') throw new Error('Invalid PO')

        // Add finished goods
        await Inventory.increase(rec.finishedItemId, rec.warehouseId, rec.qty, trx)

        // Backflush: consume raw materials per BOM
        for (const comp of po.bom.components) {
          await Inventory.decrease(comp.itemId, rec.warehouseId, comp.qtyPerUnit * rec.qty, trx)
        }

        // GL: WIP → Finished Goods
        await GLEntry.post({
          dr: { account: 'FINISHED_GOODS', amount: po.standardCost * rec.qty },
          cr: { account: 'WIP',            amount: po.standardCost * rec.qty }
        }, trx)
      })
    } catch (err) {
      errors.push({ rec, error: err.message })
    }
  }
  return { processed: records.length - errors.length, errors }
}</pre></div>`
},

'p5_1': {
  title: 'VN vs Korea Accounting — Developer cần biết gì?',
  subtitle: 'Điểm khác biệt quan trọng khi chuyển từ VAS sang K-IFRS context',
  tag: 'Accounting', tagClass: 'tag-purple',
  body: `
<div class="learn-section"><h3>So sánh tổng quan</h3>
<table class="data-table">
<thead><tr><th>Criteria</th><th>Vietnam (VAS)</th><th>Korea (K-IFRS)</th></tr></thead>
<tbody>
<tr><td>Standard</td><td>VAS — fixed by Ministry of Finance</td><td>K-IFRS — based on IFRS, flexible</td></tr>
<tr><td>Account codes</td><td>Regulated (111, 112, 331...)</td><td>Company-defined under IFRS framework</td></tr>
<tr><td>Tax invoice</td><td>Hóa đơn điện tử (eTax)</td><td>전자세금계산서 (Hometax NTS)</td></tr>
<tr><td>VAT rates</td><td>0%, 5%, 10%</td><td>0%, 10% (no 5%)</td></tr>
<tr><td>Payroll tax</td><td>PIT monthly + annual settlement</td><td>소득세 monthly + 연말정산 (Jan–Feb)</td></tr>
<tr><td>Social insurance</td><td>BHXH 8%+17.5%, BHYT 1.5%+3%</td><td>국민연금 4.5%+4.5%, 건강보험 3.545%+3.545%</td></tr>
</tbody></table></div>
<div class="learn-section"><h3>Điểm khác biệt quan trọng nhất cho Developer</h3>
<div class="callout ca-purple"><strong>1. Chart of Accounts — không còn fixed nữa</strong><br>VAS: account 111=tiền mặt, 112=tiền gửi — cứng. K-IFRS: công ty tự thiết kế CoA. ERP phải có flexible CoA module với mapping đến IFRS categories thay vì hardcode account numbers.</div>
<div class="callout ca-blue"><strong>2. 세금계산서 phức tạp hơn hóa đơn điện tử VN</strong><br>Hóa đơn VN không cần confirmation ngay. 세금계산서 phải được NTS confirm realtime qua Hometax. Nếu Hometax down → ERP cần fallback (queue + retry), không thể chỉ lưu local.</div>
<div class="callout ca-amber"><strong>3. 연말정산 không có tương đương đơn giản ở VN</strong><br>Quyết toán thuế VN = cá nhân tự kê khai hoặc qua công ty đơn giản hơn. 연말정산 Hàn phức tạp hơn nhiều với hàng chục loại deductions, employer hoàn toàn chịu trách nhiệm xử lý.</div></div>
<div class="learn-section"><h3>Số liệu hay nhầm — VN vs KR</h3>
<pre class="diagram">  VAT: VN có 0%, 5%, 10%        KR chỉ có 0% và 10% (không có 5%)

  Mã số thuế:
    VN: 10 digits (or 13 for branches) — no check digit
    KR: 10 digits (사업자번호) — HAS check digit algorithm

  BHXH rates (employer):
    VN: 17.5% employer, 8% employee
    KR: 4.5% employer (국민연금), plus health/employment separately

  Tax invoice system:
    VN: eTax Invoice → Cục thuế (periodic batch OK)
    KR: 세금계산서 → NTS via Hometax (realtime confirmation)

  Fiscal year:
    Both: January–December (calendar year default)</pre></div>`

'p5_2': {
  title: 'Soft Delete & Audit Log Pattern',
  subtitle: 'Tại sao ERP không hard-delete — design pattern và implementation',
  tag: 'ERP Pattern', tagClass: 'tag-purple',
  body: `
<div class="learn-section"><h3>Hard DELETE không được phép trong ERP</h3>
<div class="callout ca-purple">ERP tạo ra "paper trail" — dấu vết kế toán. Hard DELETE phá hủy audit trail, vi phạm K-IFRS, NTS audit requirements, và PIPA. Hai alternative: <strong>Soft Delete</strong> cho master data, <strong>Reversal Entry</strong> cho transactions.</div>
<div class="compare-grid">
  <div class="compare-card c-purple">
    <div class="cc-label">Soft Delete</div>
    <div class="cc-title">is_deleted flag</div>
    <ul class="learn-list">
      <li>Cho: vendor, customer, employee, products</li>
      <li>Field: <code>is_deleted BOOLEAN DEFAULT FALSE</code></li>
      <li>Mọi query: WHERE is_deleted = FALSE</li>
      <li>Có thể restore (undelete)</li>
    </ul>
  </div>
  <div class="compare-card c-amber">
    <div class="cc-label">Reversal Entry</div>
    <div class="cc-title">Cancel + Negate</div>
    <ul class="learn-list">
      <li>Cho: GL entries, AP/AR invoices, payroll</li>
      <li>Original preserved (status='CANCELLED')</li>
      <li>New entry with negative amounts</li>
      <li>Maintains audit trail completely</li>
    </ul>
  </div>
</div></div>
<div class="learn-section"><h3>Soft Delete Schema</h3>
<pre class="code-block">-- Add to master data tables
ALTER TABLE vendors ADD COLUMN (
  is_deleted     BOOLEAN  NOT NULL DEFAULT FALSE,
  deleted_by     BIGINT   NULL,
  deleted_at     DATETIME NULL,
  deleted_reason TEXT     NULL
);

-- Always use view or add condition:
-- BAD:  SELECT * FROM vendors WHERE id = ?
-- GOOD: SELECT * FROM vendors WHERE id = ? AND is_deleted = FALSE

-- Restore support:
UPDATE vendors SET is_deleted = FALSE, deleted_by = NULL, deleted_at = NULL
WHERE id = ? AND is_deleted = TRUE;</pre></div>
<div class="learn-section"><h3>Audit Log + Soft Delete Helper</h3>
<pre class="code-block">async function softDelete(tableName, recordId, userId, reason) {
  return db.transaction(async (trx) => {
    const before = await db(tableName).where('id', recordId).first().transacting(trx)

    if (!before) throw new Error('Record not found')
    if (before.status === 'POSTED') throw new Error('Cannot delete posted record')

    await db(tableName).where('id', recordId).update({
      is_deleted:    true,
      deleted_by:    userId,
      deleted_at:    new Date(),
      deleted_reason: reason
    }).transacting(trx)

    await db('audit_log').insert({
      table_name: tableName,
      record_id:  recordId,
      action:     'DELETE',
      changed_by: userId,
      old_values: JSON.stringify(before),
      new_values: JSON.stringify({ is_deleted: true }),
      changed_at: new Date()
    }).transacting(trx)
  })
}</pre></div>
<div class="learn-section"><h3>Reversal Entry cho Posted AP Invoice</h3>
<pre class="code-block">async function cancelPostedAPInvoice(invoiceId, userId, reason) {
  const invoice = await ApInvoice.findById(invoiceId)
  if (invoice.status === 'PAID') throw new Error('Cannot cancel: already paid')

  await db.transaction(async (trx) => {
    // Mark original as CANCELLED (do not delete)
    await ApInvoice.update(invoiceId, { status: 'CANCELLED' }, trx)

    // Create reversing GL entry (flip DR/CR)
    await GLEntry.post({
      description:    'REVERSAL of AP Invoice #' + invoiceId,
      reference_type: 'AP_CANCEL',
      reference_id:   invoiceId,
      lines: invoice.glLines.map(line => ({
        account_id: line.account_id,
        debit:      line.credit,   // flip
        credit:     line.debit
      }))
    }, trx)

    await AuditLog.insert({ action: 'CANCEL', record_id: invoiceId,
      changed_by: userId, note: reason }, trx)
  })
}</pre></div>`
},

}; // end PROMPT_DETAILS

function renderTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  PHASES.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'phase';
    el.id = 'phase-' + p.id;
    el.innerHTML = `
      <div class="phase-card">
        <div class="phase-meta">
          <span class="phase-tag ${p.tagClass}">${p.tag}</span>
          <span class="phase-duration">${p.duration}</span>
        </div>
        <div class="phase-title">${p.title}</div>
        <div class="phase-desc">${p.desc}</div>
        <div class="topic-pills">
          ${p.topics.map(t => `<span class="topic-pill">${t}</span>`).join('')}
        </div>
      </div>
    `;
    el.addEventListener('click', () => openPhase(p.id));
    tl.appendChild(el);
  });
}

function openPhase(id) {
  if (activePhase === id) {
    closePanel();
    return;
  }
  activePhase = id;
  const p = PHASES.find(x => x.id === id);

  // Update active state
  document.querySelectorAll('.phase').forEach(el => el.classList.remove('active'));
  document.getElementById('phase-' + id).classList.add('active');

  // Update header indicator
  document.getElementById('active-phase-label').textContent = p.duration;

  // Build detail content
  const weeksHTML = p.weeks.map(w => `
    <div class="week-card">
      <div class="week-label">${w.label}</div>
      <div class="week-name">${w.name}</div>
      <ul class="skill-list">
        ${w.skills.map(s => `<li>${s}</li>`).join('')}
      </ul>
    </div>
  `).join('');

  const milestonesHTML = p.milestones.map(m => `
    <div class="milestone-item">
      <div class="milestone-dot" style="background:${m.color}; box-shadow: 0 0 6px ${m.color}44"></div>
      <span>${m.text}</span>
    </div>
  `).join('');

  const promptsHTML = p.prompts.map((pr, idx) => `
    <li onclick="openPromptDetail('${p.id}',${idx})">${pr}</li>
  `).join('');

  document.getElementById('detail-inner').innerHTML = `
    <div class="detail-header">
      <div>
        <div style="margin-bottom:0.4rem"><span class="phase-tag ${p.tagClass}">${p.tag}</span></div>
        <div class="detail-phase-title">${p.title}</div>
        <div class="detail-phase-sub">${p.duration} · ${p.desc}</div>
      </div>
      <button class="detail-close" onclick="closePanel()">✕ Đóng</button>
    </div>

    <div class="week-grid">${weeksHTML}</div>

    <div class="milestone-section">
      <div class="milestone-label">// milestones</div>
      <div class="milestone-list">${milestonesHTML}</div>
    </div>

    <div class="prompt-box">
      <div class="prompt-box-title">Prompt mẫu — click để xem giải thích sâu</div>
      <ul class="prompt-list">${promptsHTML}</ul>
    </div>
  `;

  document.getElementById('detail-panel').classList.add('open');
}

function closePanel() {
  activePhase = null;
  document.querySelectorAll('.phase').forEach(el => el.classList.remove('active'));
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('active-phase-label').textContent = '—';
}



renderTimeline();

/* ── Prompt Detail Modal ── */
function openPromptDetail(phaseId, idx) {
  const phase  = PHASES.find(p => p.id === phaseId);
  const detail = PROMPT_DETAILS[phaseId + '_' + idx];
  if (!phase || !detail) return;

  currentPromptText = phase.prompts[idx];

  const tagEl = document.getElementById('pm-tag');
  tagEl.className = 'phase-tag ' + detail.tagClass;
  tagEl.textContent = detail.tag;
  document.getElementById('pm-title').textContent = detail.title;
  document.getElementById('pm-sub').textContent   = detail.subtitle;
  document.getElementById('pm-body').innerHTML    = detail.body;

  const modal = document.getElementById('prompt-modal');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePromptModal() {
  document.getElementById('prompt-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function copyCurrentPrompt() {
  if (!currentPromptText) return;
  navigator.clipboard.writeText(currentPromptText).then(() => {
    const btn = document.getElementById('pm-copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.style.background = 'rgba(74,255,160,0.2)';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = '';
    }, 2000);
  });
}

// Close modal on backdrop click
document.getElementById('prompt-modal').addEventListener('click', function(e) {
  if (e.target === this) closePromptModal();
});

// Close on ESC
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePromptModal();
});
</script>
